    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link

        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#E91E63',
                        secondary: '#9C27B0',
                        accent: '#F48FB1',
                        background: '#FFF5F7',
                        surface: '#FFFFFF',
                        text: '#4A4A4A',
                        textLight: '#7A7A7A'
                    },
                    fontFamily: {
                        heading: ['Playfair Display', 'serif'],
                        body: ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #FFF5F7;
            color: #4A4A4A;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Playfair Display', serif;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #FFF5F7;
        }

        ::-webkit-scrollbar-thumb {
            background: #E91E63;
            border-radius: 4px;
        }

        /* Animations */
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(233, 30, 99, 0.3);
            }

            50% {
                box-shadow: 0 0 40px rgba(233, 30, 99, 0.6);
            }
        }

        @keyframes gradient-shift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .animate-slide-in-right {
            animation: slideInRight 0.3s ease-out;
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        .animate-slide-up {
            animation: slideUp 0.5s ease-out;
        }

        .animate-pulse-glow {
            animation: pulse-glow 2s infinite;
        }

        .gradient-text {
            background: linear-gradient(135deg, #E91E63, #9C27B0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .gradient-bg {
            background: linear-gradient(-45deg, #E91E63, #9C27B0, #F48FB1);
            background-size: 400% 400%;
            animation: gradient-shift 8s ease infinite;
        }

        .product-card {
            transition: all 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(233, 30, 99, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #E91E63, #9C27B0);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(233, 30, 99, 0.4);
        }

        .cart-drawer {
            transition: transform 0.3s ease-in-out;
        }

        .cart-drawer.open {
            transform: translateX(0);
        }

        .cart-drawer.closed {
            transform: translateX(100%);
        }

        .toast {
            animation: slideUp 0.3s ease-out;
        }

        /* Skeleton loader */
        .skeleton {
            background: linear-gradient(90deg, #FFE4E9 25%, #FFC1D0 50%, #FFE4E9 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }

        @keyframes skeleton-loading {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* Mobile bottom nav */
        .bottom-nav {
            display: none;
        }

        /* Snapchat banner */
        .snap-banner {
            background: linear-gradient(90deg, #FFFC00, #FFD600);
            color: #1a1a1a;
            text-align: center;
            padding: 7px 12px;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 60;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 36px;
            white-space: nowrap;
            overflow: hidden;
        }

        .snap-banner-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex-shrink: 1;
        }

        .snap-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(0, 0, 0, 0.12);
            border-radius: 999px;
            padding: 2px 10px 2px 5px;
            font-size: 0.82rem;
            font-weight: 800;
            color: #1a1a1a;
            text-decoration: none;
            transition: background 0.2s;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .snap-badge:hover {
            background: rgba(0, 0, 0, 0.22);
        }

        .snap-badge svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* Navbar sits below the snap banner */
        #navbar {
            top: 36px;
        }

        /* Bottom nav safe area */
        .bottom-nav {
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }

        @media (max-width: 480px) {
            .snap-banner {
                min-height: 32px;
                padding: 5px 8px;
                gap: 4px;
                font-size: 0.72rem;
            }

            .snap-banner-text {
                display: none;
            }

            .snap-badge {
                font-size: 0.78rem;
                padding: 2px 8px 2px 4px;
            }

            #navbar {
                top: 32px;
            }
        }

        @media (max-width: 768px) {
            .bottom-nav {
                display: flex;
            }

            /* Touch targets only on nav items, not all elements */
            .bottom-nav button,
            .bottom-nav a {
                min-height: 44px;
            }

            /* Full-screen cart on mobile */
            #cart-drawer {
                max-width: 100% !important;
            }

            /* Main content padding: snap banner + navbar + some breathing room */
            #app {
                padding-top: 6rem !important;
                padding-bottom: 5rem !important;
            }
        }

        @media (max-width: 480px) {
            #app {
                padding-top: 5.5rem !important;
                padding-bottom: 5rem !important;
            }
        }
    </style>
</head>
